[crowsnest]
log_path: /home/pi/SV06_data/logs/crowsnest.log
log_level: verbose                      # Valid Options are quiet/verbose/debug
delete_log: false                       # Deletes log on every restart, if set to true
no_proxy: false

[cam 0]
mode: ustreamer
enable_rtsp: false
rtsp_port: 8554
port: 8080
device: /dev/video0
resolution: 1920x1080
max_fps: 15
#custom_flags:
#v4l2ctl:                               # Add v4l2-ctl parameters to setup your camera, see Log what your cam is capable of.

[cam 1]
mode: ustreamer
enable_rtsp: false
rtsp_port: 8554
port: 8081
device: /dev/video1
resolution: 1920x1080
max_fps: 30
#custom_flags:
#v4l2ctl:                               # Add v4l2-ctl parameters to setup your camera, see Log what your cam is capable of.
